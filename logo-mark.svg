<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <defs>
    <filter id="g" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fondo -->
  <rect width="80" height="80" fill="#080808"/>

  <!-- Escuadras mini -->
  <path d="M6,6 L6,12 M6,6 L12,6"   fill="none" stroke="#D4A853" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <path d="M74,6 L74,12 M74,6 L68,6" fill="none" stroke="#D4A853" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <path d="M6,74 L6,68 M6,74 L12,74" fill="none" stroke="#D4A853" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <path d="M74,74 L74,68 M74,74 L68,74" fill="none" stroke="#D4A853" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>

  <!-- Línea horizontal -->
  <line x1="8"  y1="42" x2="32" y2="42" stroke="#D4A853" stroke-width="0.7" opacity="0.3"/>
  <line x1="48" y1="42" x2="72" y2="42" stroke="#D4A853" stroke-width="0.7" opacity="0.3"/>

  <!-- Nodo central -->
  <circle cx="40" cy="42" r="5" fill="none" stroke="#D4A853" stroke-width="0.7" opacity="0.22"/>
  <circle cx="40" cy="42" r="2.5" fill="#D4A853" filter="url(#g)"/>

  <!-- sd pequeño -->
  <text
    x="40" y="52"
    font-family="Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-weight="300"
    font-size="40"
    fill="#F0EDE8"
    text-anchor="middle"
    dominant-baseline="alphabetic"
    letter-spacing="-1.5"
    opacity="0.93">sd</text>
</svg>
